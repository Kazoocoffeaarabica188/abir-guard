name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Python Tests ───
  test-python:
    runs-on: ubuntu-latest
    name: "Python Tests (3.10)"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -e ".[dev]"
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        pytest tests/test_abir_guard.py -v --cov=abir_guard --cov-report=xml --cov-report=term

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: python

  # ─── Rust Tests ───
  test-rust:
    runs-on: ubuntu-latest
    name: "Rust Tests"

    steps:
    - uses: actions/checkout@v4

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test --verbose

    - name: Build release
      run: cargo build --release

  # ─── Python Lint ───
  lint-python:
    runs-on: ubuntu-latest
    name: "Python Lint"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install ruff
      run: pip install ruff

    - name: Run ruff check
      run: ruff check abir_guard/

    - name: Run ruff format check
      run: ruff format --check abir_guard/

  # ─── Security Audit ───
  security:
    runs-on: ubuntu-latest
    name: "Security Audit"

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run cargo audit
      run: cargo audit

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -e .

    - name: Run pip-audit
      run: |
        pip install pip-audit
        pip-audit

  # ─── Docker Build ───
  build-docker:
    runs-on: ubuntu-latest
    name: "Docker Build"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t abir-guard:${{ github.sha }} .
        docker build -t abir-guard:latest .

    - name: Test Docker container
      run: |
        docker run -d --name ag -p 9090:9090 abir-guard:${{ github.sha }}
        sleep 5
        docker stop ag

    - name: Login to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker push abir-guard:${{ github.sha }}
        docker push abir-guard:latest

  # ─── Release ───
  release:
    needs: [test-python, test-rust, lint-python, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: "Release"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install build
      run: pip install build

    - name: Build package
      run: python -m build

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to PyPI
      if: startsWith(github.ref, 'refs/tags/')
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
